name: Orion CMMS - Alertas Diários de Manutenção

on:
  schedule:
    # Executa todos os dias às 00:00 UTC (21:00h Horário de Brasília)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite execução manual pelo painel

jobs:
  trigger-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Acordar Evolution API (Render Cold Start Fix)
        # Faz um ping na raiz da Evolution API. Ignora erros de timeout pois o objetivo é apenas disparar o Spin-Up.
        run: |
          curl -s -m 10 "${{ secrets.NEXT_PUBLIC_EVOLUTION_URL }}" || true

      - name: Pausa Estratégica para Inicialização do Contêiner
        # Aguarda 45 segundos enquanto a Render inicializa o ambiente Docker em segundo plano
        run: sleep 45

      - name: Disparar Requisição do Motor Preditivo Orion CMMS
        run: |
          curl -X GET "https://acobranca.netlify.app/api/cron/cmms-alerts" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"